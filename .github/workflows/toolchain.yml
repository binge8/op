name: Toolchain

on:
  repository_dispatch:
    types: Toolchain
  workflow_dispatch:
  #schedule:
  #  - cron: 00 13 * * *

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  APT: scripts/apt

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        PLATFORM: [x64, armv8]
    steps:
      - name: 签出
        uses: actions/checkout@main
      - name: 拉取源码
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
      - name: 缓存
        id: cache
        env:
          PLATFORM: ${{ matrix.PLATFORM }}
        uses: stupidloud/cachewrtbuild@main
        with:
          ccache: 'true'
          mixkey: '${{ env.PLATFORM }}'
          prefix: '${{ github.workspace }}/openwrt'
      - name: 搭建编译环境
        if: steps.cache.outputs.hit != '1'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y install $(cat $APT)
          sudo -E systemctl daemon-reload
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 60 --slave /usr/bin/g++ g++ /usr/bin/g++-13
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo -E timedatectl set-timezone "Asia/Shanghai"
      - name: 更新Feeds
        if: steps.cache.outputs.hit != '1'
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: 下载Packages
        if: steps.cache.outputs.hit != '1'
        env:
          PLATFORM: ${{ matrix.PLATFORM }}
        run: |
          cp -p scripts/${{ env.PLATFORM }} openwrt/.config
          cd openwrt
          make defconfig
          make download -j16
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
      - name: 编译
        if: steps.cache.outputs.hit != '1'
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make tools/compile -j$[`nproc`+1] || make tools/compile -j1 V=s
          make toolchain/compile -j$[`nproc`+1] || make toolchain/compile -j1 V=s
          echo "compile=success" >> $GITHUB_ENV
      - name: 微信推送
        if: always()
        env:
          PLATFORM: ${{ matrix.PLATFORM }}
        run: |
          if [ "${{ env.compile }}" = "success" ];then
            curl -H "Content-Type:application/json" -X POST -d '{"token":"${{ secrets.PUSHBOT }}","title":"${{ env.PLATFORM }}缓存成功,开始编译6","content":"${{ env.PLATFORM }}缓存成功A","template":"json"}' http://www.pushplus.plus/send
            curl -X POST https://api.github.com/repos/binge8/op/dispatches -H "Accept: application/vnd.github.everest-preview+json" -H "Authorization: token ${{ secrets.RELEASES_TOKEN }}" --data '{"event_type": "j${{ env.PLATFORM }}"}'
            curl -X POST https://api.github.com/repos/binge8/op/dispatches -H "Accept: application/vnd.github.everest-preview+json" -H "Authorization: token ${{ secrets.RELEASES_TOKEN }}" --data '{"event_type": "l${{ env.PLATFORM }}"}'
          elif [ "${{ env.compile }}" != "success" ] && [ -n "${{ steps.cache.outputs.hit }}" ];then
            curl -H "Content-Type:application/json" -X POST -d '{"token":"${{ secrets.PUSHBOT }}","title":"${{ env.PLATFORM }}缓存未改变,开始编译6","content":"${{ env.PLATFORM }}缓存未改变A","template":"json"}' http://www.pushplus.plus/send
            curl -X POST https://api.github.com/repos/binge8/op/dispatches -H "Accept: application/vnd.github.everest-preview+json" -H "Authorization: token ${{ secrets.RELEASES_TOKEN }}" --data '{"event_type": "j${{ env.PLATFORM }}"}'
            curl -X POST https://api.github.com/repos/binge8/op/dispatches -H "Accept: application/vnd.github.everest-preview+json" -H "Authorization: token ${{ secrets.RELEASES_TOKEN }}" --data '{"event_type": "l${{ env.PLATFORM }}"}'
          else
            curl -H "Content-Type:application/json" -X POST -d '{"token":"${{ secrets.PUSHBOT }}","title":"${{ env.PLATFORM }}缓存失败6","content":"${{ env.PLATFORM }}缓存失败A","template":"json"}' http://www.pushplus.plus/send
          fi